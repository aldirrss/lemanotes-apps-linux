<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="tui/toastui-editor.min.css">
<link rel="stylesheet" href="tui/highlight-github-dark.min.css" id="hljs-theme">
<script src="tui/toastui-editor-all.min.js"></script>
<script src="tui/highlight.min.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
  :root {
    --bg:                #0D1B22;
    --bg2:               #0A1820;
    --bg3:               #132530;
    --accent:            #7FDBCA;
    --text:              #C8DDE8;
    --muted:             #8EAAB8;
    --border:            #1A3A4A;
    --code-bg:           #132530;
    --sel-bg:            #1A3A4A;
    --placeholder:       #2A5A6A;
    --link:              #74B3CE;
    --mark-bg:           #2A4A1A;
    --mark-text:         #C8DDE8;
    --scroll-thumb:      #1A3A4A;
    --scroll-thumb-hover:#2A5A6A;
    --font-size:         15px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); }

  .toastui-editor-defaultUI,
  .toastui-editor-main,
  .toastui-editor-main-container,
  .toastui-editor-ww-container,
  .toastui-editor-ww-content,
  .toastui-editor-md-container,
  .toastui-editor-contents {
    background: var(--bg) !important;
    color: var(--text) !important;
    border: none !important;
  }
  .toastui-editor-defaultUI { height: 100vh !important; }
  .toastui-editor-toolbar   { display: none !important; }

  .ProseMirror {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Georgia', serif !important;
    font-size: var(--font-size, 15px) !important;
    line-height: 1.8 !important;
    padding: 32px 48px 80px !important;
    min-height: 100vh !important;
    caret-color: var(--accent) !important;
    outline: none !important;
  }

  .ProseMirror p, .ProseMirror div, .ProseMirror span,
  .ProseMirror li, .ProseMirror td, .ProseMirror th,
  .ProseMirror label,
  .toastui-editor-contents p, .toastui-editor-contents div,
  .toastui-editor-contents span, .toastui-editor-contents li {
    color: var(--text) !important;
  }

  .ProseMirror h1, .ProseMirror h2, .ProseMirror h3, .ProseMirror h4,
  .toastui-editor-contents h1, .toastui-editor-contents h2,
  .toastui-editor-contents h3, .toastui-editor-contents h4 {
    color: var(--accent) !important;
    font-weight: 600 !important;
    margin-top: 1.4em !important;
    margin-bottom: 0.4em !important;
  }
  .ProseMirror h1, .toastui-editor-contents h1 {
    font-size: 1.9em !important;
    border-bottom: 1px solid var(--border) !important;
    padding-bottom: 0.3em !important;
  }
  .ProseMirror h2, .toastui-editor-contents h2 { font-size: 1.45em !important; }
  .ProseMirror h3, .toastui-editor-contents h3 { font-size: 1.2em !important; }

  .ProseMirror strong, .toastui-editor-contents strong {
    color: var(--text) !important; font-weight: 700 !important;
  }
  .ProseMirror em, .toastui-editor-contents em   { color: var(--muted) !important; }
  .ProseMirror a, .toastui-editor-contents a {
    color: var(--link) !important;
    transition: color 0.15s ease, opacity 0.15s ease;
  }
  .ProseMirror a:hover, .toastui-editor-contents a:hover { opacity: 0.75 !important; }
  .ProseMirror s, .toastui-editor-contents s      { color: var(--muted) !important; }

  .ProseMirror mark, .toastui-editor-contents mark {
    background: var(--mark-bg) !important;
    color: var(--mark-text) !important;
    border-radius: 2px !important;
    padding: 0 2px !important;
  }

  /* ── Inline code ── */
  .ProseMirror code, .toastui-editor-contents code {
    background: var(--code-bg) !important;
    color: #F4A261 !important;
    border-radius: 4px !important;
    padding: 2px 6px !important;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace !important;
    font-size: 0.86em !important;
    border: none !important;
  }

  /* ── Code block (pre) wrapper ── */
  .ProseMirror pre,
  .toastui-editor-contents pre,
  .toastui-editor-ww-code-block {
    position: relative !important;
    background: var(--bg2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    margin: 1em 0 !important;
    overflow: hidden !important;
    padding: 0 !important;
  }

  /* Language label bar at the top */
  .ProseMirror pre[data-language]::before,
  .toastui-editor-contents pre[data-language]::before {
    content: attr(data-language);
    display: block;
    background: var(--bg3) !important;
    color: var(--muted) !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 0.75em !important;
    padding: 4px 14px !important;
    border-bottom: 1px solid var(--border) !important;
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }
  /* Hide bar when no language set */
  .ProseMirror pre:not([data-language])::before,
  .ProseMirror pre[data-language='']::before,
  .toastui-editor-contents pre:not([data-language])::before,
  .toastui-editor-contents pre[data-language='']::before {
    display: none !important;
  }

  /* Code inside block */
  .ProseMirror pre code,
  .toastui-editor-contents pre code {
    display: block !important;
    background: transparent !important;
    color: var(--text) !important;
    padding: 14px 16px !important;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace !important;
    font-size: 0.88em !important;
    line-height: 1.65 !important;
    border: none !important;
    border-radius: 0 !important;
    overflow-x: auto !important;
    white-space: pre !important;
  }

  /* TUI own code block container */
  .toastui-editor-ww-code-block-language {
    background: var(--bg3) !important;
    color: var(--muted) !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 0.75em !important;
    border-bottom: 1px solid var(--border) !important;
    padding: 4px 14px !important;
  }
  .toastui-editor-ww-code-block pre {
    margin: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    border-bottom-left-radius: 10px !important;
    border-bottom-right-radius: 10px !important;
  }

  /* hljs token colours override for dark themes */
  .hljs { background: transparent !important; padding: 0 !important; }
  .hljs-keyword, .hljs-built_in  { color: #79C0FF !important; }
  .hljs-string, .hljs-attr       { color: #A5D6FF !important; }
  .hljs-comment                  { color: #8B949E !important; font-style: italic; }
  .hljs-number, .hljs-literal    { color: #F2CC60 !important; }
  .hljs-variable, .hljs-name     { color: #FFA657 !important; }
  .hljs-title, .hljs-function    { color: #D2A8FF !important; }
  .hljs-params                   { color: var(--text) !important; }
  .hljs-meta                     { color: #F85149 !important; }

  .ProseMirror blockquote, .toastui-editor-contents blockquote {
    transition: border-color 0.2s ease, background 0.2s ease;
    border-left: 3px solid var(--accent) !important;
    color: var(--muted) !important;
    padding-left: 1em !important;
    margin: 0.8em 0 !important;
    font-style: italic !important;
    background: transparent !important;
  }
  .ProseMirror blockquote p, .toastui-editor-contents blockquote p {
    color: var(--muted) !important;
  }

  .ProseMirror table, .toastui-editor-contents table {
    border-collapse: collapse !important; width: 100% !important;
  }
  .ProseMirror th, .ProseMirror td,
  .toastui-editor-contents th, .toastui-editor-contents td {
    border: 1px solid var(--border) !important;
    padding: 8px 12px !important;
    color: var(--text) !important;
    background: var(--bg) !important;
  }
  .ProseMirror th, .toastui-editor-contents th {
    background: var(--code-bg) !important;
    color: var(--accent) !important;
  }
  .ProseMirror .selectedCell { background: var(--sel-bg) !important; }

  .ProseMirror ul, .ProseMirror ol,
  .toastui-editor-contents ul, .toastui-editor-contents ol {
    padding-left: 1.5em !important;
  }
  .ProseMirror li, .toastui-editor-contents li {
    margin: 4px 0 !important; color: var(--text) !important;
  }

  .ProseMirror hr, .toastui-editor-contents hr {
    border: none !important;
    border-top: 1px solid var(--border) !important;
    margin: 1em 0 !important;
  }

  .ProseMirror .placeholder::before, .ProseMirror p.is-empty::before {
    color: var(--placeholder) !important;
    content: attr(data-placeholder) !important;
    pointer-events: none !important;
    float: left !important;
    height: 0 !important;
  }

  .ProseMirror .task-list-item { list-style: none !important; }
  .ProseMirror .task-list-item input[type="checkbox"] { margin-right: 6px !important; }

  .toastui-editor-ww-container .ProseMirror-focused { outline: none !important; }
  ::selection { background: var(--sel-bg) !important; color: var(--text) !important; }

  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }
  ::-webkit-scrollbar-corner { background: var(--bg); }

  /* ── Slash command palette ── */
  #slash-palette {
    display: none;
    position: fixed;
    z-index: 9999;
    width: 280px;
    max-height: 340px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    overflow: hidden;
    flex-direction: column;
  }
  #slash-palette.open { display: flex; }

  #slash-search-wrap {
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #slash-search {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  #slash-search:focus { border-color: var(--accent); }
  #slash-search::placeholder { color: var(--placeholder); }

  #slash-list {
    overflow-y: auto;
    padding: 4px;
    flex: 1;
  }
  .slash-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .slash-item:hover,
  .slash-item.active {
    background: var(--sel-bg);
  }
  .slash-icon {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .slash-label { font-size: 13px; color: var(--text); font-weight: 500; }
  .slash-desc  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .slash-group {
    padding: 4px 10px 2px;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div id="editor"></div>

<div id="slash-palette">
  <div id="slash-search-wrap">
    <input id="slash-search" type="text" placeholder="Type to filter…" autocomplete="off" spellcheck="false">
  </div>
  <div id="slash-list"></div>
</div>

<script>
  var editor = null;
  var bridge = null;
  var _pendingContent = null;
  var _editorReady = false;
  var _currentTheme = 'dark';

  var THEMES = {
    dark: {
      '--bg':                 '#0D1B22',
      '--bg2':                '#0A1820',
      '--bg3':                '#132530',
      '--accent':             '#7FDBCA',
      '--text':               '#C8DDE8',
      '--muted':              '#8EAAB8',
      '--border':             '#1A3A4A',
      '--code-bg':            '#132530',
      '--sel-bg':             '#1A3A4A',
      '--placeholder':        '#2A5A6A',
      '--link':               '#74B3CE',
      '--mark-bg':            '#2A4A1A',
      '--mark-text':          '#C8DDE8',
      '--scroll-thumb':       '#1A3A4A',
      '--scroll-thumb-hover': '#2A5A6A'
    },
    deep_sea: {
      '--bg':                 '#020B18',
      '--bg2':                '#041525',
      '--bg3':                '#062035',
      '--accent':             '#38BDF8',
      '--text':               '#BAE6FD',
      '--muted':              '#4A8AAA',
      '--border':             '#0A3050',
      '--code-bg':            '#062035',
      '--sel-bg':             '#0A3050',
      '--placeholder':        '#1A4A6A',
      '--link':               '#7DD3FC',
      '--mark-bg':            '#0A3050',
      '--mark-text':          '#BAE6FD',
      '--scroll-thumb':       '#0A3050',
      '--scroll-thumb-hover': '#0D3D60'
    },
    midnight: {
      '--bg':                 '#0D0D1A',
      '--bg2':                '#12122A',
      '--bg3':                '#18183A',
      '--accent':             '#A78BFA',
      '--text':               '#E2E0FF',
      '--muted':              '#7A78AA',
      '--border':             '#2A2A5A',
      '--code-bg':            '#18183A',
      '--sel-bg':             '#2A2A5A',
      '--placeholder':        '#3A3870',
      '--link':               '#C4B5FD',
      '--mark-bg':            '#2A1A5A',
      '--mark-text':          '#E2E0FF',
      '--scroll-thumb':       '#2A2A5A',
      '--scroll-thumb-hover': '#32326A'
    },
    night_forest: {
      '--bg':                 '#071A0E',
      '--bg2':                '#0A2515',
      '--bg3':                '#0D3020',
      '--accent':             '#4ADE80',
      '--text':               '#BBF7D0',
      '--muted':              '#3A8A52',
      '--border':             '#144A28',
      '--code-bg':            '#0D3020',
      '--sel-bg':             '#144A28',
      '--placeholder':        '#1A4A28',
      '--link':               '#86EFAC',
      '--mark-bg':            '#144A18',
      '--mark-text':          '#BBF7D0',
      '--scroll-thumb':       '#144A28',
      '--scroll-thumb-hover': '#1A5C30'
    },
    classic: {
      '--bg':                 '#FFFFFF',
      '--bg2':                '#F5F9FF',
      '--bg3':                '#EBF3FF',
      '--accent':             '#2563EB',
      '--text':               '#1E293B',
      '--muted':              '#64748B',
      '--border':             '#C8D8EE',
      '--code-bg':            '#EBF3FF',
      '--sel-bg':             '#DBEAFE',
      '--placeholder':        '#94A3B8',
      '--link':               '#2563EB',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#1E293B',
      '--scroll-thumb':       '#C8D8EE',
      '--scroll-thumb-hover': '#B0C8E8'
    },
    ocean: {
      '--bg':                 '#F0F9FF',
      '--bg2':                '#FFFFFF',
      '--bg3':                '#E0F2FE',
      '--accent':             '#0369A1',
      '--text':               '#0C1A2E',
      '--muted':              '#4A7A9B',
      '--border':             '#BAE6FD',
      '--code-bg':            '#E0F2FE',
      '--sel-bg':             '#BAE6FD',
      '--placeholder':        '#7AAEC8',
      '--link':               '#0369A1',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#0C1A2E',
      '--scroll-thumb':       '#BAE6FD',
      '--scroll-thumb-hover': '#7DD3FC'
    },
    forest: {
      '--bg':                 '#F0FFF4',
      '--bg2':                '#FFFFFF',
      '--bg3':                '#DCFCE7',
      '--accent':             '#16A34A',
      '--text':               '#0A1F0F',
      '--muted':              '#4A7A5A',
      '--border':             '#A7F3D0',
      '--code-bg':            '#DCFCE7',
      '--sel-bg':             '#BBF7D0',
      '--placeholder':        '#7AAA8A',
      '--link':               '#16A34A',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#0A1F0F',
      '--scroll-thumb':       '#A7F3D0',
      '--scroll-thumb-hover': '#6EE7B7'
    },
    rose: {
      '--bg':                 '#FFF5F7',
      '--bg2':                '#FFFFFF',
      '--bg3':                '#FFE4E8',
      '--accent':             '#E11D48',
      '--text':               '#1F0A10',
      '--muted':              '#8A4050',
      '--border':             '#FECDD3',
      '--code-bg':            '#FFE4E8',
      '--sel-bg':             '#FECDD3',
      '--placeholder':        '#B87080',
      '--link':               '#E11D48',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#1F0A10',
      '--scroll-thumb':       '#FECDD3',
      '--scroll-thumb-hover': '#FDA4AF'
    }
  };

  var _LIGHT_THEMES = {classic:1, ocean:1, forest:1, rose:1};

  function setTheme(name) {
    var t = THEMES[name] || THEMES['dark'];
    var root = document.documentElement;
    for (var key in t) {
      root.style.setProperty(key, t[key]);
    }
    _currentTheme = name;

    // Swap highlight.js CSS between dark / light
    var hlSheet = document.getElementById('hljs-theme');
    if (hlSheet) {
      hlSheet.href = _LIGHT_THEMES[name]
        ? 'tui/highlight-github.min.css'
        : 'tui/highlight-github-dark.min.css';
    }

    // Re-apply highlighting after theme swap
    setTimeout(function() {
      document.querySelectorAll('pre code').forEach(function(b) {
        delete b.dataset.highlighted;
      });
      applyHighlighting();
    }, 100);
  }

  function setFontSize(size) {
    document.documentElement.style.setProperty('--font-size', size + 'px');
  }

  function initEditor() {
    editor = new toastui.Editor({
      el: document.getElementById('editor'),
      initialEditType: 'wysiwyg',
      previewStyle: 'vertical',
      height: '100vh',
      placeholder: 'Start writing\u2026',
      usageStatistics: false,
      toolbarItems: [],
      events: {
        change: function() {
          // Notify Python that content changed — content fetched at save time, not here
          if (bridge) bridge.on_content_change('');
          _debouncedHighlight();
        },
        caretChange: function() {
          _debouncedFormat();
        }
      }
    });

    _editorReady = true;
    if (_pendingContent !== null) {
      editor.setMarkdown(_pendingContent);
      _pendingContent = null;
    }
    if (bridge) bridge.on_editor_ready();
  }

  function setContent(md) {
    if (_editorReady && editor) {
      editor.setMarkdown(md || '');
      setTimeout(applyHighlighting, 150);
    } else {
      _pendingContent = md || '';
    }
  }

  function applyHighlighting() {
    if (typeof hljs === 'undefined') return;
    document.querySelectorAll(
      '.ProseMirror pre code, .toastui-editor-contents pre code, ' +
      '.toastui-editor-ww-code-block pre code'
    ).forEach(function(block) {
      if (block.dataset.highlighted) return;
      var pre  = block.closest('pre');
      var lang = (pre && pre.getAttribute('data-language')) || '';
      if (!lang) {
        var m = block.className.match(/language-(\S+)/);
        if (m) lang = m[1];
      }
      var code = block.textContent;
      try {
        var result = (lang && hljs.getLanguage(lang))
          ? hljs.highlight(code, { language: lang, ignoreIllegals: true })
          : hljs.highlightAuto(code);
        block.innerHTML = result.value;
      } catch(e) {}
      block.dataset.highlighted = 'yes';
    });
  }

  // ── Debounce helper ───────────────────────────────────────────────────────────
  function debounce(fn, delay) {
    var t;
    return function() { clearTimeout(t); t = setTimeout(fn, delay); };
  }

  // Debounced callbacks — defined after functions they reference
  var _debouncedHighlight = debounce(function() {
    // Reset highlighted flag so re-highlight picks up new blocks
    document.querySelectorAll('pre code[data-highlighted]').forEach(function(b) {
      delete b.dataset.highlighted;
    });
    applyHighlighting();
  }, 800);

  var _debouncedFormat = debounce(function() {
    if (bridge) bridge.on_format_change(JSON.stringify(getActiveFormats()));
  }, 120);

  function getContent() {
    if (editor) return editor.getMarkdown();
    return '';
  }

  function execCmd(cmd, payload) {
    if (editor) {
      try {
        if (payload !== undefined) {
          editor.exec(cmd, payload);
        } else {
          editor.exec(cmd);
        }
      } catch(e) {}
    }
  }

  function getActiveFormats() {
    if (!editor) return {};
    try {
      var core = editor._editor;
      var wwe  = core && (core.wwEditor || core.wwe);
      var pm   = wwe && wwe.getEditor && wwe.getEditor();
      if (!pm) return {};
      var state = pm.state;
      var sel   = state.selection;
      var marks = sel.empty
        ? (state.storedMarks || state.doc.resolve(sel.from).marks())
        : state.doc.resolve(sel.from + 1).marks();
      var a = {bold:false,italic:false,strike:false,code:false,
               heading:0,bulletList:false,orderedList:false,
               taskList:false,blockquote:false};
      marks.forEach(function(m) {
        var n = m.type.name;
        if (n === 'strong')  a.bold   = true;
        if (n === 'em')      a.italic = true;
        if (n === 'strike')  a.strike = true;
        if (n === 'code')    a.code   = true;
      });
      var $from = state.doc.resolve(sel.from);
      for (var d = $from.depth; d >= 0; d--) {
        var node = $from.node(d), name = node.type.name;
        if (name === 'heading')      { a.heading      = node.attrs.level; break; }
        if (name === 'bullet_list')  { a.bulletList   = true; break; }
        if (name === 'ordered_list') { a.orderedList  = true; break; }
        if (name === 'task_list')    { a.taskList     = true; break; }
        if (name === 'blockquote')   { a.blockquote   = true; break; }
      }
      return a;
    } catch(e) { return {}; }
  }

  function getStats() {
    if (!editor) return {words: 0, chars: 0};
    var md = editor.getMarkdown();
    var text = md
      .replace(/```[\s\S]*?```/g, ' ')
      .replace(/`[^`]+`/g, ' ')
      .replace(/#{1,6}\s+/g, '')
      .replace(/\*\*|__|\*\*|~~|\*|_/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/!\[[^\]]*\]\([^)]+\)/g, '')
      .replace(/^[-*+>\s]\s*/gm, '')
      .replace(/^\d+\.\s/gm, '')
      .trim();
    var words = text.length > 0 ? text.split(/\s+/).filter(function(w) { return w.length > 0; }).length : 0;
    return {words: words, chars: md.length};
  }

  function replaceInEditor(findText, replaceText, replaceAll) {
    if (!editor || !findText) return;
    var md = editor.getMarkdown();
    var newMd;
    if (replaceAll) {
      newMd = md.split(findText).join(replaceText);
    } else {
      var idx = md.indexOf(findText);
      if (idx === -1) return;
      newMd = md.substring(0, idx) + replaceText + md.substring(idx + findText.length);
    }
    editor.setMarkdown(newMd);
  }

  function insertLink(url, text) {
    if (!editor) return;
    try {
      editor.exec('addLink', {linkUrl: url, linkText: text || url});
    } catch(e) {
      editor.insertText('[' + (text || url) + '](' + url + ')');
    }
  }

  function insertImage(url, alt) {
    if (!editor) return;
    try {
      editor.exec('addImage', {imageUrl: url, altText: alt || ''});
    } catch(e) {
      editor.insertText('!['+ (alt || '') + '](' + url + ')');
    }
  }

  function insertTable(rows, cols) {
    if (!editor) return;
    try {
      editor.exec('addTable', {rowCount: rows, columnCount: cols});
    } catch(e) {
      var header = '| ' + Array.from({length: cols}, function(_, i) { return 'Col ' + (i+1); }).join(' | ') + ' |';
      var sep    = '| ' + Array.from({length: cols}, function() { return '---'; }).join(' | ') + ' |';
      var row    = '| ' + Array.from({length: cols}, function() { return '   '; }).join(' | ') + ' |';
      var lines  = [header, sep];
      for (var i = 0; i < rows - 1; i++) lines.push(row);
      editor.insertText('\n' + lines.join('\n') + '\n');
    }
  }

  function insertCodeBlock(lang) {
    if (!editor) return;
    try {
      // Use TUI's native codeBlock command — renders properly in WYSIWYG mode
      editor.exec('codeBlock');
    } catch(e) {
      // Fallback: switch to markdown mode, insert, switch back
      editor.changeMode('markdown');
      editor.insertText('\n```' + (lang || '') + '\n\n```\n');
      editor.changeMode('wysiwyg');
    }
  }

  function toggleHeading(level) {
    if (!editor) return;
    var active = getActiveFormats();
    if (active.heading === level) {
      // Already this heading level → convert back to paragraph
      try {
        var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
        var pm  = wwe && wwe.getEditor && wwe.getEditor();
        if (pm && pm.state.schema.nodes.paragraph) {
          var tr = pm.state.tr.setBlockType(
            pm.state.selection.from,
            pm.state.selection.to,
            pm.state.schema.nodes.paragraph
          );
          pm.dispatch(tr);
          return;
        }
      } catch(e) {}
      // Fallback: re-apply heading (some TUI versions toggle off this way)
      editor.exec('heading', {level: level});
    } else {
      editor.exec('heading', {level: level});
    }
  }

  function setParagraph() {
    if (!editor) return;
    try {
      var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
      var pm  = wwe && wwe.getEditor && wwe.getEditor();
      if (pm && pm.state.schema.nodes.paragraph) {
        var tr = pm.state.tr.setBlockType(
          pm.state.selection.from,
          pm.state.selection.to,
          pm.state.schema.nodes.paragraph
        );
        pm.dispatch(tr);
      }
    } catch(e) {}
  }

  function clearFormat() {
    if (!editor) return;
    try {
      var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
      var pm  = wwe && wwe.getEditor && wwe.getEditor();
      if (pm) {
        var state = pm.state;
        var from  = state.selection.from;
        var to    = state.selection.to;
        if (from === to) return;
        var tr = state.tr;
        Object.values(state.schema.marks).forEach(function(mark) {
          tr = tr.removeMark(from, to, mark);
        });
        pm.dispatch(tr);
      }
    } catch(e) {}
  }

  function highlightSelection() {
    if (!editor) return;
    try {
      document.execCommand('hiliteColor', false,
        _currentTheme === 'light' ? '#FFF176' : '#2A5A1A');
    } catch(e) {}
  }

  // ── Slash command palette ─────────────────────────────────────────────────────
  var SLASH_COMMANDS = [
    { group: 'Format',    icon: 'B',    label: 'Bold',          desc: 'Bold text',              cmd: function() { editor.exec('bold'); } },
    { group: 'Format',    icon: 'I',    label: 'Italic',        desc: 'Italic text',            cmd: function() { editor.exec('italic'); } },
    { group: 'Format',    icon: 'S',    label: 'Strikethrough', desc: 'Strikethrough text',     cmd: function() { editor.exec('strike'); } },
    { group: 'Format',    icon: 'H',    label: 'Highlight',     desc: 'Highlight selection',    cmd: function() { highlightSelection(); } },
    { group: 'Heading',   icon: 'H1',   label: 'Heading 1',     desc: 'Large section heading',  cmd: function() { editor.exec('heading', { level: 1 }); } },
    { group: 'Heading',   icon: 'H2',   label: 'Heading 2',     desc: 'Medium section heading', cmd: function() { editor.exec('heading', { level: 2 }); } },
    { group: 'Heading',   icon: 'H3',   label: 'Heading 3',     desc: 'Small section heading',  cmd: function() { editor.exec('heading', { level: 3 }); } },
    { group: 'Block',     icon: '•',    label: 'Bullet List',   desc: 'Unordered list',         cmd: function() { editor.exec('bulletList'); } },
    { group: 'Block',     icon: '1.',   label: 'Ordered List',  desc: 'Numbered list',          cmd: function() { editor.exec('orderedList'); } },
    { group: 'Block',     icon: '☑',   label: 'Task List',     desc: 'Checklist / to-do',      cmd: function() { editor.exec('taskList'); } },
    { group: 'Block',     icon: '"',    label: 'Blockquote',    desc: 'Quote block',            cmd: function() { editor.exec('blockQuote'); } },
    { group: 'Block',     icon: '—',    label: 'Divider',       desc: 'Horizontal rule',        cmd: function() { editor.exec('hr'); } },
    { group: 'Insert',    icon: '</>',  label: 'Code Block',    desc: 'Fenced code block',      cmd: function() { insertCodeBlock(''); } },
    { group: 'Insert',    icon: '`',    label: 'Inline Code',   desc: 'Inline code span',       cmd: function() { editor.exec('code'); } },
    { group: 'Insert',    icon: '⊞',   label: 'Table',         desc: '3 × 3 table',            cmd: function() { insertTable(3, 3); } },
  ];

  var _slashActive    = false;
  var _slashInsertPos = null;  // PM position right after '/' when palette opened
  var _slashFiltered  = SLASH_COMMANDS.slice();
  var _slashIdx       = 0;

  var _palette  = document.getElementById('slash-palette');
  var _searchEl = document.getElementById('slash-search');
  var _listEl   = document.getElementById('slash-list');

  function _openPalette() {
    _slashActive    = true;
    _slashInsertPos = null;
    _slashIdx       = 0;
    _searchEl.value = '';
    _renderPalette('');
    _palette.classList.add('open');

    // Position: try ProseMirror coordsAtPos first, then Selection API, then fallback
    var placed = false;
    try {
      var wwe2 = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
      var pm2  = wwe2 && wwe2.getEditor && wwe2.getEditor();
      if (pm2 && pm2.coordsAtPos) {
        var coords = pm2.coordsAtPos(pm2.state.selection.from);
        var top  = coords.bottom + 6;
        var left = coords.left;
        if (left + 285 > window.innerWidth)  left = window.innerWidth - 290;
        if (top  + 350 > window.innerHeight) top  = coords.top - 356;
        _palette.style.top  = Math.max(4, top)  + 'px';
        _palette.style.left = Math.max(4, left) + 'px';
        placed = true;
      }
    } catch(e2) {}

    if (!placed) {
      try {
        var sel = window.getSelection();
        if (sel && sel.rangeCount) {
          var rng   = sel.getRangeAt(0).cloneRange();
          rng.collapse(true);
          var rects = rng.getClientRects();
          if (rects && rects.length) {
            var r    = rects[0];
            var top2 = r.bottom + 6;
            var lft2 = r.left;
            if (lft2 + 285 > window.innerWidth)  lft2 = window.innerWidth - 290;
            if (top2 + 350 > window.innerHeight) top2 = r.top - 356;
            _palette.style.top  = Math.max(4, top2) + 'px';
            _palette.style.left = Math.max(4, lft2) + 'px';
            placed = true;
          }
        }
      } catch(e3) {}
    }

    if (!placed) {
      // Absolute fallback: center-bottom of viewport
      _palette.style.top  = Math.round(window.innerHeight * 0.35) + 'px';
      _palette.style.left = Math.round((window.innerWidth - 280) / 2) + 'px';
    }

    setTimeout(function() { _searchEl.focus(); }, 30);
  }

  function _closePalette(deleteSlash) {
    _slashActive    = false;
    _slashInsertPos = null;
    _palette.classList.remove('open');
    setTimeout(function() {
      // Restore editor focus first so cursor is back at the '/' position
      try { editor.focus(); } catch(e) {}
      if (deleteSlash) {
        setTimeout(function() {
          // execCommand('delete') = Backspace — deletes char before cursor
          // More reliable than PM internals when focus has moved
          var deleted = false;
          try {
            var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
            var pm  = wwe && wwe.getEditor && wwe.getEditor();
            if (pm) {
              var from = pm.state.selection.from;
              if (from > 0) {
                pm.dispatch(pm.state.tr.delete(from - 1, from));
                deleted = true;
              }
            }
          } catch(e) {}
          if (!deleted) {
            try { document.execCommand('delete'); } catch(e2) {}
          }
        }, 15);
      }
    }, 20);
  }

  function _renderPalette(query) {
    var q = query.toLowerCase().trim();
    _slashFiltered = q
      ? SLASH_COMMANDS.filter(function(c) {
          return c.label.toLowerCase().indexOf(q) !== -1 ||
                 c.desc.toLowerCase().indexOf(q)  !== -1 ||
                 c.group.toLowerCase().indexOf(q) !== -1;
        })
      : SLASH_COMMANDS.slice();

    _listEl.innerHTML = '';
    var lastGroup = '';
    _slashFiltered.forEach(function(c, i) {
      if (c.group !== lastGroup) {
        var g = document.createElement('div');
        g.className = 'slash-group';
        g.textContent = c.group;
        _listEl.appendChild(g);
        lastGroup = c.group;
      }
      var item = document.createElement('div');
      item.className = 'slash-item' + (i === _slashIdx ? ' active' : '');
      item.dataset.idx = i;
      item.innerHTML =
        '<div class="slash-icon">' + c.icon + '</div>' +
        '<div><div class="slash-label">' + c.label + '</div>' +
             '<div class="slash-desc">'  + c.desc  + '</div></div>';
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        _execSlash(parseInt(this.dataset.idx));
      });
      _listEl.appendChild(item);
    });
    _setActiveItem(0);
  }

  function _setActiveItem(idx) {
    _slashIdx = Math.max(0, Math.min(idx, _slashFiltered.length - 1));
    var items = _listEl.querySelectorAll('.slash-item');
    items.forEach(function(el, i) {
      el.classList.toggle('active', i === _slashIdx);
    });
    if (items[_slashIdx]) {
      items[_slashIdx].scrollIntoView({ block: 'nearest' });
    }
  }

  function _execSlash(idx) {
    var c = _slashFiltered[idx];
    if (!c) return;
    _closePalette(true);
    setTimeout(function() { c.cmd(); }, 60);
  }

  function _getCaretRect() {
    try {
      var sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      var range = sel.getRangeAt(0).cloneRange();
      range.collapse(true);
      var rects = range.getClientRects();
      return rects && rects.length ? rects[0] : null;
    } catch(e) { return null; }
  }

  // Search input events
  _searchEl.addEventListener('input', function() {
    _renderPalette(this.value);
  });

  _searchEl.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); _setActiveItem(_slashIdx + 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); _setActiveItem(_slashIdx - 1); }
    else if (e.key === 'Enter')   { e.preventDefault(); _execSlash(_slashIdx); }
    else if (e.key === 'Escape')  { e.preventDefault(); _closePalette(false); }
  });

  // Close when clicking outside
  document.addEventListener('mousedown', function(e) {
    if (_slashActive && !_palette.contains(e.target)) {
      _closePalette(false);
    }
  });

  // Intercept "/" — use keyup so the char is already in the editor when we act.
  // keyup bubbles reliably in QtWebEngine without conflicting with TUI's keymap.
  document.addEventListener('keyup', function(e) {
    if (!editor || _slashActive) return;
    if (e.key !== '/' && e.code !== 'Slash') return;
    // Skip if inside a code block
    try {
      var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
      var pm  = wwe && wwe.getEditor && wwe.getEditor();
      if (pm) {
        var $from = pm.state.doc.resolve(pm.state.selection.from);
        for (var d = $from.depth; d >= 0; d--) {
          if ($from.node(d).type.name === 'code_block') return;
        }
      }
    } catch(ex) {}
    _openPalette();
  }, true);

  // ── Code block language sync ────────────────────────────────────────────────
  // TUI Editor doesn't always set data-language on <pre> when user changes language.
  // We watch for the language <input> being added and sync its value to the pre.
  function _bindLangInput(inp) {
    if (inp._lbBound) return;
    inp._lbBound = true;
    function _syncLang() {
      var val   = inp.value.trim();
      var block = inp.closest && inp.closest('.toastui-editor-ww-code-block');
      var pre   = block && block.querySelector('pre');
      if (!pre) return;
      if (val) pre.setAttribute('data-language', val);
      else     pre.removeAttribute('data-language');
    }
    inp.addEventListener('input',  _syncLang);
    inp.addEventListener('change', _syncLang);
    inp.addEventListener('blur',   _syncLang);
  }

  function _initCodeLangSync() {
    var root = document.getElementById('editor');
    if (!root) return;
    new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        m.addedNodes.forEach(function(n) {
          if (n.nodeType !== 1) return;
          var sel    = '.toastui-editor-ww-code-block-language input';
          var inputs = n.querySelectorAll ? Array.from(n.querySelectorAll(sel)) : [];
          if (n.matches && n.matches(sel)) inputs.push(n);
          inputs.forEach(_bindLangInput);
          // Also: when a code block is newly created, clear the default data-language
          // so our ::before bar stays hidden until user actually sets a language
          var blocks = n.querySelectorAll ? Array.from(n.querySelectorAll('.toastui-editor-ww-code-block pre')) : [];
          if (n.matches && n.matches('.toastui-editor-ww-code-block pre')) blocks.push(n);
          blocks.forEach(function(pre) {
            var lang = (pre.getAttribute('data-language') || '').trim();
            if (!lang || lang === 'text') pre.removeAttribute('data-language');
          });
        });
      });
    }).observe(root, { childList: true, subtree: true });
  }

  new QWebChannel(qt.webChannelTransport, function(channel) {
    bridge = channel.objects.bridge;
    initEditor();
    _initCodeLangSync();
  });
</script>
</body>
</html>
