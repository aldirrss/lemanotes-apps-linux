<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="tui/toastui-editor.min.css">
<script src="tui/toastui-editor-all.min.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
  :root {
    --bg:                #0D1B22;
    --bg2:               #0A1820;
    --bg3:               #132530;
    --accent:            #7FDBCA;
    --text:              #C8DDE8;
    --muted:             #8EAAB8;
    --border:            #1A3A4A;
    --code-bg:           #132530;
    --sel-bg:            #1A3A4A;
    --placeholder:       #2A5A6A;
    --link:              #74B3CE;
    --mark-bg:           #2A4A1A;
    --mark-text:         #C8DDE8;
    --scroll-thumb:      #1A3A4A;
    --scroll-thumb-hover:#2A5A6A;
    --font-size:         15px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); }

  .toastui-editor-defaultUI,
  .toastui-editor-main,
  .toastui-editor-main-container,
  .toastui-editor-ww-container,
  .toastui-editor-ww-content,
  .toastui-editor-md-container,
  .toastui-editor-contents {
    background: var(--bg) !important;
    color: var(--text) !important;
    border: none !important;
  }
  .toastui-editor-defaultUI { height: 100vh !important; }
  .toastui-editor-toolbar   { display: none !important; }

  .ProseMirror {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Georgia', serif !important;
    font-size: var(--font-size, 15px) !important;
    line-height: 1.8 !important;
    padding: 32px 48px 80px !important;
    min-height: 100vh !important;
    caret-color: var(--accent) !important;
    outline: none !important;
  }

  .ProseMirror p, .ProseMirror div, .ProseMirror span,
  .ProseMirror li, .ProseMirror td, .ProseMirror th,
  .ProseMirror label,
  .toastui-editor-contents p, .toastui-editor-contents div,
  .toastui-editor-contents span, .toastui-editor-contents li {
    color: var(--text) !important;
  }

  .ProseMirror h1, .ProseMirror h2, .ProseMirror h3, .ProseMirror h4,
  .toastui-editor-contents h1, .toastui-editor-contents h2,
  .toastui-editor-contents h3, .toastui-editor-contents h4 {
    color: var(--accent) !important;
    font-weight: 600 !important;
    margin-top: 1.4em !important;
    margin-bottom: 0.4em !important;
  }
  .ProseMirror h1, .toastui-editor-contents h1 {
    font-size: 1.9em !important;
    border-bottom: 1px solid var(--border) !important;
    padding-bottom: 0.3em !important;
  }
  .ProseMirror h2, .toastui-editor-contents h2 { font-size: 1.45em !important; }
  .ProseMirror h3, .toastui-editor-contents h3 { font-size: 1.2em !important; }

  .ProseMirror strong, .toastui-editor-contents strong {
    color: var(--text) !important; font-weight: 700 !important;
  }
  .ProseMirror em, .toastui-editor-contents em   { color: var(--muted) !important; }
  .ProseMirror a, .toastui-editor-contents a {
    color: var(--link) !important;
    transition: color 0.15s ease, opacity 0.15s ease;
  }
  .ProseMirror a:hover, .toastui-editor-contents a:hover { opacity: 0.75 !important; }
  .ProseMirror s, .toastui-editor-contents s      { color: var(--muted) !important; }

  .ProseMirror mark, .toastui-editor-contents mark {
    background: var(--mark-bg) !important;
    color: var(--mark-text) !important;
    border-radius: 2px !important;
    padding: 0 2px !important;
  }

  .ProseMirror code, .toastui-editor-contents code {
    transition: background 0.15s ease;
    background: var(--code-bg) !important;
    color: #F4A261 !important;
    border-radius: 4px !important;
    padding: 1px 5px !important;
    font-family: 'JetBrains Mono', 'Courier New', monospace !important;
    font-size: 0.88em !important;
    border: none !important;
  }
  .ProseMirror pre, .toastui-editor-contents pre {
    background: var(--bg2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 16px !important;
    margin: 0.8em 0 !important;
  }
  .ProseMirror pre code, .toastui-editor-contents pre code {
    background: transparent !important;
    color: var(--text) !important;
    padding: 0 !important;
  }

  .ProseMirror blockquote, .toastui-editor-contents blockquote {
    transition: border-color 0.2s ease, background 0.2s ease;
    border-left: 3px solid var(--accent) !important;
    color: var(--muted) !important;
    padding-left: 1em !important;
    margin: 0.8em 0 !important;
    font-style: italic !important;
    background: transparent !important;
  }
  .ProseMirror blockquote p, .toastui-editor-contents blockquote p {
    color: var(--muted) !important;
  }

  .ProseMirror table, .toastui-editor-contents table {
    border-collapse: collapse !important; width: 100% !important;
  }
  .ProseMirror th, .ProseMirror td,
  .toastui-editor-contents th, .toastui-editor-contents td {
    border: 1px solid var(--border) !important;
    padding: 8px 12px !important;
    color: var(--text) !important;
    background: var(--bg) !important;
  }
  .ProseMirror th, .toastui-editor-contents th {
    background: var(--code-bg) !important;
    color: var(--accent) !important;
  }
  .ProseMirror .selectedCell { background: var(--sel-bg) !important; }

  .ProseMirror ul, .ProseMirror ol,
  .toastui-editor-contents ul, .toastui-editor-contents ol {
    padding-left: 1.5em !important;
  }
  .ProseMirror li, .toastui-editor-contents li {
    margin: 4px 0 !important; color: var(--text) !important;
  }

  .ProseMirror hr, .toastui-editor-contents hr {
    border: none !important;
    border-top: 1px solid var(--border) !important;
    margin: 1em 0 !important;
  }

  .ProseMirror .placeholder::before, .ProseMirror p.is-empty::before {
    color: var(--placeholder) !important;
    content: attr(data-placeholder) !important;
    pointer-events: none !important;
    float: left !important;
    height: 0 !important;
  }

  .ProseMirror .task-list-item { list-style: none !important; }
  .ProseMirror .task-list-item input[type="checkbox"] { margin-right: 6px !important; }

  .toastui-editor-ww-container .ProseMirror-focused { outline: none !important; }
  ::selection { background: var(--sel-bg) !important; color: var(--text) !important; }

  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); border-radius: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }
  ::-webkit-scrollbar-corner { background: var(--bg); }
</style>
</head>
<body>
<div id="editor"></div>

<script>
  var editor = null;
  var bridge = null;
  var _pendingContent = null;
  var _editorReady = false;
  var _currentTheme = 'dark';

  var THEMES = {
    dark: {
      '--bg':                 '#0D1B22',
      '--bg2':                '#0A1820',
      '--bg3':                '#132530',
      '--accent':             '#7FDBCA',
      '--text':               '#C8DDE8',
      '--muted':              '#8EAAB8',
      '--border':             '#1A3A4A',
      '--code-bg':            '#132530',
      '--sel-bg':             '#1A3A4A',
      '--placeholder':        '#2A5A6A',
      '--link':               '#74B3CE',
      '--mark-bg':            '#2A4A1A',
      '--mark-text':          '#C8DDE8',
      '--scroll-thumb':       '#1A3A4A',
      '--scroll-thumb-hover': '#2A5A6A'
    },
    deep_sea: {
      '--bg':                 '#020B18',
      '--bg2':                '#041525',
      '--bg3':                '#062035',
      '--accent':             '#38BDF8',
      '--text':               '#BAE6FD',
      '--muted':              '#4A8AAA',
      '--border':             '#0A3050',
      '--code-bg':            '#062035',
      '--sel-bg':             '#0A3050',
      '--placeholder':        '#1A4A6A',
      '--link':               '#7DD3FC',
      '--mark-bg':            '#0A3050',
      '--mark-text':          '#BAE6FD',
      '--scroll-thumb':       '#0A3050',
      '--scroll-thumb-hover': '#0D3D60'
    },
    midnight: {
      '--bg':                 '#0D0D1A',
      '--bg2':                '#12122A',
      '--bg3':                '#18183A',
      '--accent':             '#A78BFA',
      '--text':               '#E2E0FF',
      '--muted':              '#7A78AA',
      '--border':             '#2A2A5A',
      '--code-bg':            '#18183A',
      '--sel-bg':             '#2A2A5A',
      '--placeholder':        '#3A3870',
      '--link':               '#C4B5FD',
      '--mark-bg':            '#2A1A5A',
      '--mark-text':          '#E2E0FF',
      '--scroll-thumb':       '#2A2A5A',
      '--scroll-thumb-hover': '#32326A'
    },
    night_forest: {
      '--bg':                 '#071A0E',
      '--bg2':                '#0A2515',
      '--bg3':                '#0D3020',
      '--accent':             '#4ADE80',
      '--text':               '#BBF7D0',
      '--muted':              '#3A8A52',
      '--border':             '#144A28',
      '--code-bg':            '#0D3020',
      '--sel-bg':             '#144A28',
      '--placeholder':        '#1A4A28',
      '--link':               '#86EFAC',
      '--mark-bg':            '#144A18',
      '--mark-text':          '#BBF7D0',
      '--scroll-thumb':       '#144A28',
      '--scroll-thumb-hover': '#1A5C30'
    },
    classic: {
      '--bg':                 '#FFFFFF',
      '--bg2':                '#F5F9FF',
      '--bg3':                '#EBF3FF',
      '--accent':             '#2563EB',
      '--text':               '#1E293B',
      '--muted':              '#64748B',
      '--border':             '#C8D8EE',
      '--code-bg':            '#EBF3FF',
      '--sel-bg':             '#DBEAFE',
      '--placeholder':        '#94A3B8',
      '--link':               '#2563EB',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#1E293B',
      '--scroll-thumb':       '#C8D8EE',
      '--scroll-thumb-hover': '#B0C8E8'
    },
    ocean: {
      '--bg':                 '#F0F9FF',
      '--bg2':                '#FFFFFF',
      '--bg3':                '#E0F2FE',
      '--accent':             '#0369A1',
      '--text':               '#0C1A2E',
      '--muted':              '#4A7A9B',
      '--border':             '#BAE6FD',
      '--code-bg':            '#E0F2FE',
      '--sel-bg':             '#BAE6FD',
      '--placeholder':        '#7AAEC8',
      '--link':               '#0369A1',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#0C1A2E',
      '--scroll-thumb':       '#BAE6FD',
      '--scroll-thumb-hover': '#7DD3FC'
    },
    forest: {
      '--bg':                 '#F0FFF4',
      '--bg2':                '#FFFFFF',
      '--bg3':                '#DCFCE7',
      '--accent':             '#16A34A',
      '--text':               '#0A1F0F',
      '--muted':              '#4A7A5A',
      '--border':             '#A7F3D0',
      '--code-bg':            '#DCFCE7',
      '--sel-bg':             '#BBF7D0',
      '--placeholder':        '#7AAA8A',
      '--link':               '#16A34A',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#0A1F0F',
      '--scroll-thumb':       '#A7F3D0',
      '--scroll-thumb-hover': '#6EE7B7'
    },
    rose: {
      '--bg':                 '#FFF5F7',
      '--bg2':                '#FFFFFF',
      '--bg3':                '#FFE4E8',
      '--accent':             '#E11D48',
      '--text':               '#1F0A10',
      '--muted':              '#8A4050',
      '--border':             '#FECDD3',
      '--code-bg':            '#FFE4E8',
      '--sel-bg':             '#FECDD3',
      '--placeholder':        '#B87080',
      '--link':               '#E11D48',
      '--mark-bg':            '#FEF08A',
      '--mark-text':          '#1F0A10',
      '--scroll-thumb':       '#FECDD3',
      '--scroll-thumb-hover': '#FDA4AF'
    }
  };

  function setTheme(name) {
    var t = THEMES[name] || THEMES['dark'];
    var root = document.documentElement;
    for (var key in t) {
      root.style.setProperty(key, t[key]);
    }
    _currentTheme = name;
  }

  function setFontSize(size) {
    document.documentElement.style.setProperty('--font-size', size + 'px');
  }

  function initEditor() {
    editor = new toastui.Editor({
      el: document.getElementById('editor'),
      initialEditType: 'wysiwyg',
      previewStyle: 'vertical',
      height: '100vh',
      placeholder: 'Start writing\u2026',
      usageStatistics: false,
      toolbarItems: [],
      events: {
        change: function() {
          if (bridge) {
            bridge.on_content_change(editor.getMarkdown());
          }
        },
        caretChange: function() {
          if (bridge) {
            bridge.on_format_change(JSON.stringify(getActiveFormats()));
          }
        }
      }
    });

    _editorReady = true;
    if (_pendingContent !== null) {
      editor.setMarkdown(_pendingContent);
      _pendingContent = null;
    }
    if (bridge) bridge.on_editor_ready();
  }

  function setContent(md) {
    if (_editorReady && editor) {
      editor.setMarkdown(md || '');
    } else {
      _pendingContent = md || '';
    }
  }

  function getContent() {
    if (editor) return editor.getMarkdown();
    return '';
  }

  function execCmd(cmd, payload) {
    if (editor) {
      try {
        if (payload !== undefined) {
          editor.exec(cmd, payload);
        } else {
          editor.exec(cmd);
        }
      } catch(e) {}
    }
  }

  function getActiveFormats() {
    if (!editor) return {};
    try {
      var core = editor._editor;
      var wwe  = core && (core.wwEditor || core.wwe);
      var pm   = wwe && wwe.getEditor && wwe.getEditor();
      if (!pm) return {};
      var state = pm.state;
      var sel   = state.selection;
      var marks = sel.empty
        ? (state.storedMarks || state.doc.resolve(sel.from).marks())
        : state.doc.resolve(sel.from + 1).marks();
      var a = {bold:false,italic:false,strike:false,code:false,
               heading:0,bulletList:false,orderedList:false,
               taskList:false,blockquote:false};
      marks.forEach(function(m) {
        var n = m.type.name;
        if (n === 'strong')  a.bold   = true;
        if (n === 'em')      a.italic = true;
        if (n === 'strike')  a.strike = true;
        if (n === 'code')    a.code   = true;
      });
      var $from = state.doc.resolve(sel.from);
      for (var d = $from.depth; d >= 0; d--) {
        var node = $from.node(d), name = node.type.name;
        if (name === 'heading')      { a.heading      = node.attrs.level; break; }
        if (name === 'bullet_list')  { a.bulletList   = true; break; }
        if (name === 'ordered_list') { a.orderedList  = true; break; }
        if (name === 'task_list')    { a.taskList     = true; break; }
        if (name === 'blockquote')   { a.blockquote   = true; break; }
      }
      return a;
    } catch(e) { return {}; }
  }

  function getStats() {
    if (!editor) return {words: 0, chars: 0};
    var md = editor.getMarkdown();
    var text = md
      .replace(/```[\s\S]*?```/g, ' ')
      .replace(/`[^`]+`/g, ' ')
      .replace(/#{1,6}\s+/g, '')
      .replace(/\*\*|__|\*\*|~~|\*|_/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/!\[[^\]]*\]\([^)]+\)/g, '')
      .replace(/^[-*+>\s]\s*/gm, '')
      .replace(/^\d+\.\s/gm, '')
      .trim();
    var words = text.length > 0 ? text.split(/\s+/).filter(function(w) { return w.length > 0; }).length : 0;
    return {words: words, chars: md.length};
  }

  function replaceInEditor(findText, replaceText, replaceAll) {
    if (!editor || !findText) return;
    var md = editor.getMarkdown();
    var newMd;
    if (replaceAll) {
      newMd = md.split(findText).join(replaceText);
    } else {
      var idx = md.indexOf(findText);
      if (idx === -1) return;
      newMd = md.substring(0, idx) + replaceText + md.substring(idx + findText.length);
    }
    editor.setMarkdown(newMd);
  }

  function insertLink(url, text) {
    if (!editor) return;
    try {
      editor.exec('addLink', {linkUrl: url, linkText: text || url});
    } catch(e) {
      editor.insertText('[' + (text || url) + '](' + url + ')');
    }
  }

  function insertImage(url, alt) {
    if (!editor) return;
    try {
      editor.exec('addImage', {imageUrl: url, altText: alt || ''});
    } catch(e) {
      editor.insertText('!['+ (alt || '') + '](' + url + ')');
    }
  }

  function insertTable(rows, cols) {
    if (!editor) return;
    try {
      editor.exec('addTable', {rowCount: rows, columnCount: cols});
    } catch(e) {
      var header = '| ' + Array.from({length: cols}, function(_, i) { return 'Col ' + (i+1); }).join(' | ') + ' |';
      var sep    = '| ' + Array.from({length: cols}, function() { return '---'; }).join(' | ') + ' |';
      var row    = '| ' + Array.from({length: cols}, function() { return '   '; }).join(' | ') + ' |';
      var lines  = [header, sep];
      for (var i = 0; i < rows - 1; i++) lines.push(row);
      editor.insertText('\n' + lines.join('\n') + '\n');
    }
  }

  function insertCodeBlock(lang) {
    if (!editor) return;
    editor.insertText('\n```' + (lang || '') + '\n\n```\n');
  }

  function toggleHeading(level) {
    if (!editor) return;
    var active = getActiveFormats();
    if (active.heading === level) {
      // Already this heading level → convert back to paragraph
      try {
        var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
        var pm  = wwe && wwe.getEditor && wwe.getEditor();
        if (pm && pm.state.schema.nodes.paragraph) {
          var tr = pm.state.tr.setBlockType(
            pm.state.selection.from,
            pm.state.selection.to,
            pm.state.schema.nodes.paragraph
          );
          pm.dispatch(tr);
          return;
        }
      } catch(e) {}
      // Fallback: re-apply heading (some TUI versions toggle off this way)
      editor.exec('heading', {level: level});
    } else {
      editor.exec('heading', {level: level});
    }
  }

  function setParagraph() {
    if (!editor) return;
    try {
      var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
      var pm  = wwe && wwe.getEditor && wwe.getEditor();
      if (pm && pm.state.schema.nodes.paragraph) {
        var tr = pm.state.tr.setBlockType(
          pm.state.selection.from,
          pm.state.selection.to,
          pm.state.schema.nodes.paragraph
        );
        pm.dispatch(tr);
      }
    } catch(e) {}
  }

  function clearFormat() {
    if (!editor) return;
    try {
      var wwe = editor._editor && (editor._editor.wwEditor || editor._editor.wwe);
      var pm  = wwe && wwe.getEditor && wwe.getEditor();
      if (pm) {
        var state = pm.state;
        var from  = state.selection.from;
        var to    = state.selection.to;
        if (from === to) return;
        var tr = state.tr;
        Object.values(state.schema.marks).forEach(function(mark) {
          tr = tr.removeMark(from, to, mark);
        });
        pm.dispatch(tr);
      }
    } catch(e) {}
  }

  function highlightSelection() {
    if (!editor) return;
    try {
      document.execCommand('hiliteColor', false,
        _currentTheme === 'light' ? '#FFF176' : '#2A5A1A');
    } catch(e) {}
  }

  new QWebChannel(qt.webChannelTransport, function(channel) {
    bridge = channel.objects.bridge;
    initEditor();
  });
</script>
</body>
</html>
